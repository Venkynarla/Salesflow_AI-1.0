services:
  - type: web
    name: salesflow-ai
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: DATABASE_URL
        value: sqlite:///./sales_automation.db
      - key: EMAIL_DEV_MODE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SENDER_NAME
        value: Venkat
